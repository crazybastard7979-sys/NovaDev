version: "3.9"

# NovaDev Cloud IDE — Docker Compose
# Production-grade multi-service architecture
# Usage: docker-compose up -d

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: novadev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: novadev
      POSTGRES_USER: novadev
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-novadev_secret_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novadev -d novadev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novadev

  # ─── Redis Cache & Queue ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: novadev_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret_change_me}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novadev

  # ─── API Server ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: novadev_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://novadev:${POSTGRES_PASSWORD:-novadev_secret_change_me}@postgres:5432/novadev
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_change_me}@redis:6379
      SESSION_SECRET: ${SESSION_SECRET:-change_this_in_production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - novadev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"

  # ─── Frontend (Static Build) ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: artifacts/cloud-ide/Dockerfile
    container_name: novadev_frontend
    restart: unless-stopped
    environment:
      PORT: 3000
      BASE_PATH: /
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - novadev

  # ─── NGINX Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: novadev_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - novadev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  novadev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
